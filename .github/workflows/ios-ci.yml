name: iOS CI

on:
  push:
    branches:
      - main
      - stable*
      - versus-ci-ios
      - wip-ios-support
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "${{ matrix.config.name }} | ${{ matrix.config.build_type }}"
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
        - {
            name: "iOS 12+ arm64 (Modern)",
            os: macos-26,
            extra_options: "-DTHEXTECH_EXECUTABLE_NAME=\"thextech\"",
            # ninja wget p7zip - are already installed
            deps_cmdline: "brew trust aws/tap && brew install lftp",
            generator: "Xcode",
            build_type: "MinSizeRel",
            min_version: "12.0",
            package_prefix: "thextech-ios12",
            package_arch: "arm64",
            upload_directory: "www/ios/"
          }
        - {
            name: "tvOS 12+ arm64",
            os: macos-26,
            extra_options: "-DTHEXTECH_EXECUTABLE_NAME=\"thextech\"",
            # ninja wget p7zip - are already installed
            deps_cmdline: "brew trust aws/tap && brew install lftp",
            generator: "Xcode",
            build_type: "MinSizeRel",
            min_version: "12.0",
            package_prefix: "thextech-tvos",
            package_arch: "arm64",
            upload_directory: "www/tvos/"
          }

    steps:
    - name: Check for the upload support
      id: upload-check
      shell: bash
      run: |
        if [[ "${{ secrets.builds_login }}" != '' && \
              "${{ secrets.builds_password }}" != '' && \
              "${{ secrets.builds_host }}" != '' ]]; then
            echo "available=true" >> $GITHUB_OUTPUT;
        else
            echo "available=false" >> $GITHUB_OUTPUT;
        fi

    - name: Install Dependencies
      shell: bash
      run: |
        if [[ ! -z "${{ matrix.config.deps_cmdline }}" ]]; then
            eval ${{ matrix.config.deps_cmdline }}
        fi

    - name: CI Server's network meta-info
      shell: bash
      run: |
        echo "CI server IP address:"
        wget -q -O - ipinfo.io/ip
        printf "\n"
        wget -d ipinfo.io/ip -O/dev/null 2>&1 |grep ^User-Agent

    - uses: TheXTech/checkout@v0.1

    - uses: TheXTech/branch-name@v0.1


    - name: Pull submodules
      shell: bash
      run: |
        git submodule update --init --recursive

    - name: Configure (arm64, iOS 12+)
      shell: bash
      run: |
        if [[ ! -z "${{ matrix.config.extra_path }}" ]]; then
            export PATH=${{ matrix.config.extra_path }}:${PATH}
            echo "PATH environment: ${PATH}"
        fi
        cmake -B build-ios \
              -G "${{ matrix.config.generator }}" \
              -DCPACK_PACKAGE_FILE_NAME="${{ matrix.config.package_prefix }}-${{ matrix.config.package_arch }}-${BRANCH_NAME}" \
              -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=${{ matrix.config.min_version }} -DCMAKE_OSX_ARCHITECTURES="${{ matrix.config.package_arch }}" \
              -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED="NO" -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED="NO" \
              -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} \
              ${{ matrix.config.extra_options }} .

    - name: Build (arm64, iOS 12+)
      shell: bash
      run: |
        if [[ ! -z "${{ matrix.config.extra_path }}" ]]; then
            export PATH=${{ matrix.config.extra_path }}:${PATH}
        fi
        export MAKEFLAGS=--keep-going
        cmake --build build-ios --config ${{ matrix.config.build_type }} --parallel 3

    - name: Create Package
      if: success()
      shell: bash
      run: |
        cd build-ios
        cpack -C MinSizeRel .
        cd ..

    - name: Upload IPA artifact
      if: success()
      uses: actions/upload-artifact@v7
      continue-on-error: true
      with:
        path: ./build-ios/*.ipa
        name: ${{ matrix.config.name }} ${{ matrix.config.build_type }} IPA

    - name: Deploy to builds.wohlsoft.ru
      if: success() && github.event_name != 'pull_request' && steps.upload-check.outputs.available == 'true'
      continue-on-error: true
      shell: bash
      run: |
        if [[ ! -z "${{ matrix.config.extra_path }}" ]]; then
            export PATH=${{ matrix.config.extra_path }}:${PATH}
        fi

        UPLOAD_LIST="set ssl:verify-certificate no;"
        cd build-ios

        if ls *.ipa 1> /dev/null 2>&1; then
            for q in *.ipa; do
                UPLOAD_LIST="${UPLOAD_LIST} put -O ${{ matrix.config.upload_directory }} $q;"
            done
        fi

        lftp -e "${UPLOAD_LIST} exit" -u ${{ secrets.builds_login }},${{ secrets.builds_password }} ${{ secrets.builds_host }}

        cd ..

    - name: List Build Directory
      if: always()
      shell: bash
      run: |
        git status
        ls -lR build-ios

